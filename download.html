<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>뇽파민 다운로드</title>
  <meta property="og:title" content="뇽파민 - 매일 랜덤 고양이 편지">
  <meta property="og:description" content="하루에 한 번, 예고 없이 찾아오는 귀여움. 뇽편지를 날려 뇽파민을 충전하세요!">
  <meta property="og:image" content="https://sunhyeong-hong.github.io/nyong/icon.png">
  <script>
    (function() {
      var ua = navigator.userAgent || navigator.vendor || window.opera;
      var isIOS = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      var isAndroid = /android/i.test(ua);

      if (isIOS) {
        window.location.href = 'https://apps.apple.com/app/id6759514657';
      } else if (isAndroid) {
        window.location.href = 'https://play.google.com/store/apps/details?id=com.nyong.app';
      }
    })();
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #FFF5F5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { text-align: center; padding: 40px 20px; max-width: 400px; }
    .icon { width: 120px; height: 120px; border-radius: 24px; margin-bottom: 24px; }
    h1 { font-size: 28px; margin-bottom: 8px; color: #333; }
    p { font-size: 16px; color: #666; margin-bottom: 32px; }
    .buttons { display: flex; flex-direction: column; gap: 12px; }
    a { display: block; padding: 16px 24px; border-radius: 12px; text-decoration: none; font-size: 16px; font-weight: 600; }
    .ios { background: #000; color: #fff; }
    .android { background: #01875f; color: #fff; }
  </style>
</head>
<body>
  <div class="container">
    <img src="https://sunhyeong-hong.github.io/nyong/icon.png" alt="뇽파민" class="icon" onerror="this.style.display='none'">
    <h1>뇽파민</h1>
    <p>하루에 한 번, 예고 없이 찾아오는 귀여움</p>
    <div class="buttons">
      <a href="https://apps.apple.com/app/id6759514657" class="ios">App Store에서 다운로드</a>
      <a href="https://play.google.com/store/apps/details?id=com.nyong.app" class="android">Google Play에서 다운로드</a>
    </div>
  </div>
</body>
</html>
